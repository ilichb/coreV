name: Refresh inactive holders cache

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch: {}

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Ping refresh endpoint
        run: |
          curl -sf -X GET "https://core.andromedacomputer.net/api/internal/refresh-holders" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}"