services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    ports:
      - "4000:3000"
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next
    environment:
      - NODE_ENV=development
      - NEXT_TELEMETRY_DISABLED=1
      - MONGODB_URI=mongodb://mongodb:27017/andromeda
      - REDIS_URL=redis://redis:6379
      - REDIS_TCP_HOST=redis
      - REDIS_TCP_PORT=6379
    depends_on:
      mongodb:
        condition: service_started
      redis:
        condition: service_started
    restart: unless-stopped

  mongodb:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: andromeda
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    restart: unless-stopped

volumes:
  mongodb_data:
  redis_data:
